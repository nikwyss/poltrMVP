name: Build and Push Services

on:
  push:
    paths:
      - 'services/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      # Serialize: parallel pushes of services that share base-image layers
      # race on ghcr.io cross-repo blob mounts and fail with "unknown blob".
      max-parallel: 1
      matrix:
        service: [appview, indexer, community-writer, front, cms, calculator]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/poltr-${{ matrix.service }}
          TAG=${{ github.sha }}
          BUILD_ARGS=""
          if [ "${{ matrix.service }}" = "front" ]; then
            BUILD_ARGS="--build-arg NEXT_PUBLIC_EID_VERIFICATION_ENABLED=false"
          fi
          docker build --no-cache $BUILD_ARGS -t ${IMAGE}:${TAG} -t ${IMAGE}:latest ./services/${{ matrix.service }}
          # Retry pushes: ghcr.io occasionally returns transient "unknown blob".
          for ref in "${IMAGE}:${TAG}" "${IMAGE}:latest"; do
            pushed=false
            for attempt in 1 2 3; do
              if docker push "$ref"; then pushed=true; break; fi
              echo "push of $ref failed (attempt $attempt), retrying in 10s..."
              sleep 10
            done
            if [ "$pushed" != true ]; then
              echo "ERROR: giving up on $ref after 3 attempts"
              exit 1
            fi
          done

      - name: Output image tag
        run: echo "Built ghcr.io/${{ github.repository_owner }}/poltr-${{ matrix.service }}:${{ github.sha }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for kubectl config)
        uses: actions/checkout@v5

      - name: Set up kubeconfig file
        run: |
          set -euo pipefail
          KFILE="${{ github.workspace }}/kubeconfig"
          echo 'Preparing kubeconfig file'
          if printf '%s' "${{ secrets.KUBECONFIG }}" | base64 --decode >/dev/null 2>&1; then
            printf '%s' "${{ secrets.KUBECONFIG }}" | base64 --decode > "$KFILE"
          else
            printf '%s' "${{ secrets.KUBECONFIG }}" > "$KFILE"
          fi
          chmod 600 "$KFILE"
        shell: bash

      - name: Install kubectl manually
        run: |
          set -euo pipefail
          curl -LO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          sudo install -m 755 kubectl /usr/local/bin/kubectl

      - name: Deploy to cluster
        run: |
          set -euo pipefail
          KUBECONFIG_FILE="${{ github.workspace }}/kubeconfig"
          export KUBECONFIG="$KUBECONFIG_FILE"
          echo "KUBECONFIG path: $KUBECONFIG"
          # optionally show the server & context (no secrets)
          kubectl config view --kubeconfig "$KUBECONFIG" --minify -o yaml
          IMAGE_FRONT=ghcr.io/${{ github.repository_owner }}/poltr-front:${{ github.sha }}
          IMAGE_APP=ghcr.io/${{ github.repository_owner }}/poltr-appview:${{ github.sha }}
          IMAGE_WRITER=ghcr.io/${{ github.repository_owner }}/poltr-community-writer:${{ github.sha }}
          IMAGE_INDEXER=ghcr.io/${{ github.repository_owner }}/poltr-indexer:${{ github.sha }}
          IMAGE_CMS=ghcr.io/${{ github.repository_owner }}/poltr-cms:${{ github.sha }}
          IMAGE_CALCULATOR=ghcr.io/${{ github.repository_owner }}/poltr-calculator:${{ github.sha }}
          # run kubectl operations (guarded to avoid failing whole workflow for missing resources)
          kubectl -n poltr set image deployment/appview appview="$IMAGE_APP" || true
          echo "Updating community-writer deployment to $IMAGE_WRITER"
          kubectl -n poltr set image deployment/community-writer community-writer="$IMAGE_WRITER" || true
          echo "Updating frontend deployment to $IMAGE_FRONT"
          kubectl -n poltr set image deployment/frontend frontend="$IMAGE_FRONT" || true
          kubectl -n poltr set image deployment/indexer indexer="$IMAGE_INDEXER" || true
          echo "Updating cms deployment to $IMAGE_CMS"
          kubectl -n poltr set image deployment/cms cms="$IMAGE_CMS" || true
          echo "Updating calculator deployment to $IMAGE_CALCULATOR"
          kubectl -n poltr set image deployment/calculator calculator="$IMAGE_CALCULATOR" || true
          echo "Waiting for appview rollout..."
          kubectl -n poltr rollout status deployment/appview --timeout=180s || true
          echo "Waiting for community-writer rollout..."
          kubectl -n poltr rollout status deployment/community-writer --timeout=180s || true
          echo "Waiting for indexer rollout..."
          kubectl -n poltr rollout status deployment/indexer --timeout=180s || true
          echo "Waiting for frontend rollout..."
          kubectl -n poltr rollout status deployment/frontend --timeout=180s || true
          echo "Waiting for cms rollout..."
          kubectl -n poltr rollout status deployment/cms --timeout=180s || true
          echo "Waiting for calculator rollout..."
          kubectl -n poltr rollout status deployment/calculator --timeout=180s || true
        shell: bash
