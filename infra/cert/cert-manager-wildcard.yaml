# Wildcard / DNS-01 Certificate Setup
#
# Full documentation: see doc/TLS_CERTIFICATES.md
#
# Prerequisites:
# 1. Install Infomaniak webhook (Helm chart was discontinued — use the rendered
#    manifest published with each release):
#    kubectl apply -f https://github.com/Infomaniak/cert-manager-webhook-infomaniak/releases/download/v0.3.1/rendered-manifest.yaml
#
# 2. Create API token at: https://manager.infomaniak.com/v3/profile/api-tokens
#    Scope: "Domain" (read+write on DNS zones)
#
# 3. Create secret with the webhook's expected name — the RBAC Role shipped by
#    the webhook is scoped to exactly this name; renaming it will yield
#    "secret … not found" at runtime.
#    kubectl create secret generic infomaniak-api-credentials \
#      --namespace cert-manager \
#      --from-literal=api-token='YOUR_TOKEN'
#
# 4. Apply this file:
#    kubectl apply -f infra/cert/cert-manager-wildcard.yaml
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns
spec:
  acme:
    email: admin@poltr.info
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-dns-account-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.infomaniak.com
            solverName: infomaniak
            config:
              apiTokenSecretRef:
                name: infomaniak-api-credentials
                key: api-token
---
# Optional: Explicitly request the wildcard certificate
# (cert-manager will also auto-create from Ingress annotation)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: poltr-wildcard-cert
  namespace: poltr
spec:
  secretName: poltr-wildcard-tls
  issuerRef:
    name: letsencrypt-prod-dns
    kind: ClusterIssuer
  dnsNames:
    - "poltr.info"
    - "*.poltr.info"
---
# HTTP-01 ClusterIssuer for non-wildcard domains
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-http
spec:
  acme:
    email: admin@poltr.info
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-http-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Certificate for poltr.ch domain (using HTTP-01)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: poltr-ch-cert
  namespace: poltr
spec:
  secretName: poltr-ch-tls
  issuerRef:
    name: letsencrypt-prod-http
    kind: ClusterIssuer
  dnsNames:
    - "poltr.ch"
---
# Wildcard certificate for handle domain *.id.poltr.ch (using DNS-01)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: poltr-handle-cert
  namespace: poltr
spec:
  secretName: poltr-handle-tls
  issuerRef:
    name: letsencrypt-prod-dns
    kind: ClusterIssuer
  dnsNames:
    - "*.id.poltr.ch"
