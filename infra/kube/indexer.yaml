apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer
  namespace: poltr
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: indexer
  template:
    metadata:
      labels:
        app: indexer
    spec:
      containers:
        - name: indexer
          image: ghcr.io/nikwyss/poltr-indexer:latest
          envFrom:
            - secretRef:
                name: indexer-secrets
          env:
            - name: PDS_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_HOSTNAME
            # Language config: appview-secrets is the single source of truth.
            # The indexer must use the SAME set as the appview, otherwise it
            # derives translation_status against a different language set.
            - name: POLTR_LANGUAGES
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: POLTR_LANGUAGES
            - name: POLTR_DEFAULT_LANGUAGE
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: POLTR_DEFAULT_LANGUAGE
            # Peer-review quorum seeds app_peerreviews.quorum at argument creation.
            # Lives in writer-secrets (home of all peer-review config); the indexer
            # is the actual consumer and inherits it from there.
            - name: PEER_REVIEW_QUORUM
              valueFrom:
                secretKeyRef:
                  name: writer-secrets
                  key: PEER_REVIEW_QUORUM

          ports:
            # Admin/backfill HTTP server listens on BACKFILL_PORT (3001).
            - containerPort: 3001
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: indexer
  namespace: poltr
spec:
  selector:
    app: indexer
  ports:
    - name: http
      port: 80
      targetPort: 3001
