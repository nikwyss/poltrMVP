apiVersion: apps/v1
kind: Deployment
metadata:
  name: allforone-postgres
  namespace: poltr
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: allforone-postgres
  template:
    metadata:
      labels:
        app: allforone-postgres
    spec:
      containers:
        - name: postgres
          # pgvector via custom alpine-Image (postgres:15-alpine + vector-Extension),
          # NICHT pgvector/pgvector:pg15 (Debian): der Debian-Wechsel scheitert am
          # bestehenden, von alpine (musl, uid 70) angelegten Cinder/ext4-Volume
          # (CrashLoop, mkdir Permission denied) und brächte zudem eine Collation-
          # Migration (musl→glibc REINDEX). Das Alpine-Image bleibt drop-in.
          # Build: infra/docker/postgres-pgvector/Dockerfile. Siehe doc/LM_PEER_REVIEW.md.
          image: postgres:15-alpine
          envFrom:
            - secretRef:
                name: allforone-postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: allforone-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: allforone-postgres
  namespace: poltr
spec:
  selector:
    app: allforone-postgres
  ports:
    - port: 5432
      targetPort: 5432
