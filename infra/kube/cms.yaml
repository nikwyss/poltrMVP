apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms
  namespace: poltr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cms
  template:
    metadata:
      labels:
        app: cms
    spec:
      imagePullSecrets:
        - name: ghcr-registry
      containers:
        - name: cms
          image: ghcr.io/nikwyss/poltr-cms:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: cms-secrets
          env:
            # COMMUNITY-Master-Key wohnt jetzt in writer-secrets (community-writer
            # ist der Eigentümer); cms erbt ihn von dort, nicht mehr aus appview-secrets.
            - name: APPVIEW_COMMUNITY_CREDS_MASTER_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: writer-secrets
                  key: APPVIEW_COMMUNITY_CREDS_MASTER_KEY_B64
            # Eng gescopte cms-Rolle (nur auth.community_accounts +
            # app_taxonomy_snapshot) — bewusst aus cms-secrets, NICHT aus
            # appview-secrets (das auf die allforone-Superuser-Rolle zeigt).
            - name: APPVIEW_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: cms-secrets
                  key: APPVIEW_POSTGRES_URL
            - name: PDS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_ADMIN_PASSWORD
            - name: PDS_PUBLIC_HANDLE
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_PUBLIC_HANDLE
            - name: PDS_ACCOUNT_EMAIL_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_ACCOUNT_EMAIL_DOMAIN
            - name: PDS_INTERNAL_URL
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_INTERNAL_URL
            # Server-seitiger Zugriff aufs Calculator-Service (Taxonomie-Snapshots
            # beim Persistieren). Interner K8s-Service, kein Ingress nötig.
            - name: CALCULATOR_INTERNAL_URL
              value: "http://calculator.poltr.svc.cluster.local"

          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: cms-media
              mountPath: /app/media
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /admin
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /admin
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: cms-media
          persistentVolumeClaim:
            claimName: cms-media
---
apiVersion: v1
kind: Service
metadata:
  name: cms
  namespace: poltr
spec:
  selector:
    app: cms
  ports:
    - name: http
      port: 80
      targetPort: 3000
