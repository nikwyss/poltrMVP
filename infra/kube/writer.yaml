# Writer — interne Schreib-Seite (Phase 1 der ATProto-native-Deliberation-Umstellung)
#
# Zieht die Governance-Schreibarbeit aus der internet-zugewandten appview-API in
# einen eigenen internen Prozess. Phase 1 = nur der Bluesky-Crosspost-Loop
# (reuse von services/appview/src/atproto/crosspost.py über src.writer_main).
# Spätere Phasen: Akzeptanz-Pipeline (app_acceptance_queue), Translator, Assignment.
#
# Nutzt dasselbe Image wie appview, nur mit anderem Command (kein HTTP-Server,
# kein Service nötig — reiner Hintergrund-Worker).
#
# Full split (entschieden): eigener Pod + eigene DB-Rolle 'writer'. writer-secrets
# enthält NUR writer-Spezifisches (DB-URL writer@, Flags); geteilte Config
# (Master-Key, Peer-Review, Log-Level, PDS_INTERNAL_URL) wird via secretKeyRef
# aus appview-/pds-secrets geerbt — keine Duplikate. Der entscheidende Unterschied
# zu appview: nur die 'writer'-DB-Rolle liest die Gov-Creds (pw-Spalten). Den
# Master-Key teilen beide noch (bis zum Key-Split, doc/TODO.md).
#
# Voraussetzung: APPVIEW_CROSSPOST_ENABLED="true" in writer-secrets. Die
# appview-API führt den Crosspost-Loop nicht mehr aus.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: writer
  namespace: poltr
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: writer
  template:
    metadata:
      labels:
        app: writer
    spec:
      imagePullSecrets:
        - name: ghcr-registry
      containers:
        - name: writer
          image: ghcr.io/nikwyss/poltr-appview:latest
          imagePullPolicy: Always
          command: ["python", "-m", "src.writer_main"]
          envFrom:
            - secretRef:
                name: writer-secrets
          env:
            # Geteilte Werte erben (keine Duplikate in writer-secrets).
            # Master-Key: bis zum Key-Split mit appview geteilt → danach eigenen
            # Gov-Key in writer-secrets legen und diesen Eintrag entfernen.
            - name: APPVIEW_GOV_CREDS_MASTER_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: APPVIEW_GOV_CREDS_MASTER_KEY_B64
            - name: APPVIEW_PEER_REVIEW_ENABLED
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: APPVIEW_PEER_REVIEW_ENABLED
            # Assignment-Logik (Phase 6) im Writer — dieselben Werte wie appview.
            - name: APPVIEW_PEER_REVIEW_DAILY_LIMIT
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: APPVIEW_PEER_REVIEW_DAILY_LIMIT
            - name: APPVIEW_PEER_REVIEW_INVITE_PROBABILITY
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: APPVIEW_PEER_REVIEW_INVITE_PROBABILITY
            - name: APPVIEW_LOG_LEVEL
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: APPVIEW_LOG_LEVEL
            # Translator (Phase 5) braucht die Sprachenliste — single source of
            # truth in appview-secrets (auch indexer erbt sie von dort).
            - name: POLTR_LANGUAGES
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: POLTR_LANGUAGES
            - name: POLTR_DEFAULT_LANGUAGE
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: POLTR_DEFAULT_LANGUAGE
            - name: PDS_INTERNAL_URL
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_INTERNAL_URL
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
