apiVersion: apps/v1
kind: Deployment
metadata:
  name: ozone-redis
  namespace: poltr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ozone-redis
  template:
    metadata:
      labels:
        app: ozone-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ozone-redis
  namespace: poltr
spec:
  selector:
    app: ozone-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ozone
  namespace: poltr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ozone
  template:
    metadata:
      labels:
        app: ozone
    spec:
      containers:
        - name: ozone
          image: ghcr.io/bluesky-social/ozone:latest
          envFrom:
            - secretRef:
                name: ozone-secrets
          env:
            - name: OZONE_APPVIEW_URL
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: APPVIEW_URL
            - name: OZONE_APPVIEW_DID
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: APPVIEW_DID
            - name: OZONE_PDS_URL
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_URL
            - name: OZONE_DID_PLC_URL
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_DID_PLC_URL
            - name: OZONE_PDS_DID
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_DID

          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /xrpc/_health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /xrpc/_health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ozone
  namespace: poltr
spec:
  selector:
    app: ozone
  ports:
    - name: http
      port: 80
      targetPort: http
