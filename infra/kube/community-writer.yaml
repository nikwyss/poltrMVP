# Writer — interne Schreib-Seite der ATProto-native-Deliberation
#
# Zieht die Community-Schreibarbeit aus der internet-zugewandten appview-API in
# einen eigenen internen Prozess: Crosspost (Phase 1), Translation (Phase 5),
# Akzeptanz-Pipeline (app_acceptance_queue) + Review-Assignment (Phase 6).
#
# EIGENER Service + EIGENES Image (services/community-writer, ghcr.io/.../poltr-community-writer);
# reiner Hintergrund-Worker (CMD im Dockerfile, kein HTTP-Server, kein k8s-Service).
# src/shared/ enthält manuell aus services/appview gesyncte Module (pds_creds, db,
# errors, languages) — beim Ändern dort drüben mitziehen.
#
# Full split (entschieden): eigener Pod + eigene DB-Rolle 'writer'. writer-secrets
# enthält writer-Spezifisches (DB-URL writer@, Crosspost/Translate-Flags, den
# COMMUNITY-Master-Key + die PEER_REVIEW_*-Assignment-Parameter). Nur noch der
# geteilte Master-Schalter APPVIEW_PEER_REVIEW_ENABLED, APPVIEW_LOG_LEVEL,
# POLTR_LANGUAGES/DEFAULT und PDS_INTERNAL_URL werden via secretKeyRef aus
# appview-/pds-secrets geerbt. Der entscheidende Unterschied zu appview: nur die
# 'writer'-DB-Rolle liest die Community-Creds (pw-Spalten), und nur der Writer
# hält den COMMUNITY-Master-Key.
#
# Voraussetzung: APPVIEW_CROSSPOST_ENABLED="true" in writer-secrets. Die
# appview-API führt den Crosspost-Loop nicht mehr aus.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-writer
  namespace: poltr
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: community-writer
  template:
    metadata:
      labels:
        app: community-writer
    spec:
      imagePullSecrets:
        - name: ghcr-registry
      containers:
        - name: community-writer
          image: ghcr.io/nikwyss/poltr-community-writer:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: writer-secrets
          env:
            # COMMUNITY-Master-Key + PEER_REVIEW_*-Assignment-Parameter
            # (DAILY_LIMIT/INVITE_PROBABILITY/QUORUM) liegen jetzt in writer-secrets
            # und kommen via envFrom (oben) rein — keine secretKeyRefs mehr nötig.
            # Nur noch der geteilte Master-Schalter + Log-Level werden aus
            # appview-secrets geerbt (single source of truth, mit appview geteilt).
            - name: APPVIEW_PEER_REVIEW_ENABLED
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: APPVIEW_PEER_REVIEW_ENABLED
            - name: APPVIEW_LOG_LEVEL
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: APPVIEW_LOG_LEVEL
            # Translator (Phase 5) braucht die Sprachenliste — single source of
            # truth in appview-secrets (auch indexer erbt sie von dort).
            - name: POLTR_LANGUAGES
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: POLTR_LANGUAGES
            - name: POLTR_DEFAULT_LANGUAGE
              valueFrom:
                secretKeyRef:
                  name: appview-secrets
                  key: POLTR_DEFAULT_LANGUAGE
            - name: PDS_INTERNAL_URL
              valueFrom:
                secretKeyRef:
                  name: pds-secrets
                  key: PDS_INTERNAL_URL
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
